packages:
  - apps/*
  - packages/*

allowBuilds:
  '@tailwindcss/oxide': true
  esbuild: true
  lefthook: true
  unrs-resolver: true

catalog:
  '@tailwindcss/vite': 4.2.4
  '@types/bun': 1.3.13
  '@types/node': 24.12.2
  '@typescript/native-preview': 7.0.0-dev.20260423.1
  electrobun: 1.16.0
  eslint: 10.2.1
  eslint-plugin-import-x: 4.16.2
  eslint-plugin-unused-imports: 4.4.1
  lefthook: 2.1.6
  oxfmt: 0.46.0
  oxlint: 1.61.0
  oxlint-tsgolint: 0.21.1
  tailwindcss: 4.2.4
  typescript: 6.0.3
  vite: 8.0.10
  zod: 4.3.6

enableGlobalVirtualStore: true

minimumReleaseAge: 4320

overrides:
  tailwind-csstree: 0.3.1

packageExtensions:
  '@iconify/tailwind4@1.2.3':
    dependencies:
      '@iconify-json/lucide': '*'
  electrobun@1.16.0:
    dependencies:
      '@types/three': ^0.181.0
  tailwind-csstree@0.2.0:
    dependencies:
      '@eslint/css-tree': '*'

shellEmulator: true
